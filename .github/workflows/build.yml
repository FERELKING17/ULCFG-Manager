name: Build PS2 ELF

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: ps2dev/ps2sdk:latest
    env:
      PS2SDK: /usr/local/ps2dev/ps2sdk

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: apk add --no-cache make libmpc mpfr gmp

    - name: Build
      run: make

    - name: Upload ELF
      uses: actions/upload-artifact@v4
      with:
        name: ulcfg.elf
        path: ulcfg.elf