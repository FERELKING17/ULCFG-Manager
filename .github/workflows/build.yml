name: Build PS2 ELF

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ps2dev/ps2sdk:latest
    env:
      PS2SDK: /usr/local/ps2dev/ps2sdk

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        # Search for packages that provide libmpc
        apk update
        apk info | grep -i mpc
        apk search libmpc

    - name: Build
      run: make

    - name: Upload ELF
      uses: actions/upload-artifact@v4
      with:
        name: ulcfg.elf
        path: ulcfg.elf