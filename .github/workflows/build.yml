name: Build PS2 ELF

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ps2dev/ps2sdk:latest
    env:
      PS2SDK: /usr/local/ps2dev/ps2sdk

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        apk add --no-cache make mpc mpfr4 gmp
        find /usr/lib -name "libmpc.so*" 2>/dev/null
        find /usr/lib64 -name "libmpc.so*" 2>/dev/null
        if [ -f /usr/lib/libmpc.so.4 ]; then
          ln -sf /usr/lib/libmpc.so.4 /usr/lib/libmpc.so.3
        elif [ -f /usr/lib64/libmpc.so.4 ]; then
          ln -sf /usr/lib64/libmpc.so.4 /usr/lib64/libmpc.so.3
          ln -sf /usr/lib64/libmpc.so.4 /usr/lib/libmpc.so.3
        fi

    - name: Build
      run: make

    - name: Upload ELF
      uses: actions/upload-artifact@v4
      with:
        name: ulcfg.elf
        path: ulcfg.elf