name: Build PS2 ELF

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ps2dev/ps2sdk:latest
    env:
      PS2SDK: /usr/local/ps2dev/ps2sdk

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: apk add --no-cache make mpc mpfr4 gmp && if [ -f /usr/lib/libmpc.so.4 ] && [ ! -f /usr/lib/libmpc.so.3 ]; then ln -s /usr/lib/libmpc.so.4 /usr/lib/libmpc.so.3; fi

    - name: Build
      run: make

    - name: Upload ELF
      uses: actions/upload-artifact@v4
      with:
        name: ulcfg.elf
        path: ulcfg.elf