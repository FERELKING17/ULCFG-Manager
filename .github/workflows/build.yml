name: Build PS2 ELF

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: ps2dev/ps2sdk:latest
    env:
      PS2SDK: /usr/local/ps2dev/ps2sdk

    steps:
    - uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        apk add --no-cache make gcc build-base
        # Install mpc-dev which should provide libmpc
        apk add --no-cache -X http://dl-cdn.alpinelinux.org/alpine/edge/community mpc-dev mpfr-dev gmp-dev || \
        apk add --no-cache mpc-tools mpfr-dev gmp-dev || \
        true
        # Try to find and list what we have
        find /usr -name "libmpc*" -o -name "libmpfr*" -o -name "libgmp*" 2>/dev/null | head -20

    - name: Build
      run: make

    - name: Upload ELF
      uses: actions/upload-artifact@v4
      with:
        name: ulcfg.elf
        path: ulcfg.elf